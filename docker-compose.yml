services:
  indii-agent:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: indii-agent
    ports:
      - "50080:80"   # UI Port
      - "8880:8080"  # RFC Port
    working_dir: /a0
    volumes:
      - ~/Documents/indii_Workspace:/a0/usr/projects
      - ./python/tools:/a0/python/tools/custom  # Map custom tools to a subdirectory or overlay
      - ./prompts:/a0/prompts/custom            # Map custom prompts
      - ./agents:/a0/agents/custom              # Since agents folder is in root, map it clearly
      # Note: Mapping directly to /a0/python/tools might overwrite default tools if not careful.
      # Agent Zero recursively looks for tools? The user guide says "Default tools: /python/tools/".
      # Best practice for Agent Zero might be to map to the agents folder for agent-specific tools, 
      # or rely on the build to COPY them. 
      # For this setup, we'll try to map into the agents extension directories or use volume mounting 
      # for persistence. Be careful not to hide the original files.
      # ALTERNATIVE: We can rely on the Dockerfile to COPY files if we don't need hot-reload dev.
      # But for "Ghost in the Shell" dev, volume mapping is better.
      # Let's assume standard Agent Zero structure allows adding files to these dirs.
      # We will map specific directories to avoid over-mounting.
      - ./python/tools/indii_image_gen.py:/a0/python/tools/indii_image_gen.py
      - ./python/tools/indii_video_gen.py:/a0/python/tools/indii_video_gen.py
      - ./python/tools/indii_audio_ear.py:/a0/python/tools/indii_audio_ear.py
      - ./python/config/ai_models.py:/a0/python/config/ai_models.py
      - ./prompts/agent.system.tool.indii_image_gen.md:/a0/prompts/agent.system.tool.indii_image_gen.md
      - ./prompts/agent.system.tool.indii_video_gen.md:/a0/prompts/agent.system.tool.indii_video_gen.md
      - ./prompts/agent.system.tool.indii_audio_ear.md:/a0/prompts/agent.system.tool.indii_audio_ear.md
      # Map the full agents directory for profiles
      - ./agents/indii_curriculum:/a0/agents/indii_curriculum
      # Provisioning & Knowledge
      - ./python/api/provision_project.py:/a0/python/api/provision_project.py
      - ./python/api/indii_sync.py:/a0/python/api/indii_sync.py
      - ./prompts/templates:/a0/prompts/templates
      - ./global_assets/knowledge:/a0/knowledge
      - ./agents/indii_executor:/a0/agents/indii_executor
      - ./agents/default:/a0/agents/default
      - ./agents/agent0:/a0/agents/agent0
      # Custom API Handler for Indii Task Execution
      - ./python/api/indii_task.py:/a0/python/api/indii_task.py
      - ./python/api/auth_broker.py:/a0/python/api/auth_broker.py
      - ./settings.json:/a0/tmp/settings.json
    environment:
      - PORT=80
      - WEB_UI_HOST=0.0.0.0
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GOOGLE_API_KEY}
      - EMBEDDING_MODEL=models/embedding-001
    restart: unless-stopped
