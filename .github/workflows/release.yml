name: Release

# Triggered by a version tag (e.g. v1.2.3). Builds all platforms and
# publishes distributable artifacts to GitHub Releases so electron-updater
# can find and serve them to installed desktop clients.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # required to create/modify GitHub Releases

jobs:
  release:
    name: Build & publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libgbm1 \
            libasound2t64 libpangocairo-1.0-0 libxss1 libgtk-3-0 libsecret-1-dev

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # macOS code signing — uses Apple certificates from GitHub secrets.
      # Leave CSC_LINK / CSC_KEY_PASSWORD empty on forks; signing is skipped.
      - name: Build & publish desktop installer
        run: npm run electron:build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing (optional — set these secrets to enable)
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: true
          # Windows signing (optional)
          WIN_CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools@13.29.1

      - name: Authenticate with Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/gcloud-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json" >> $GITHUB_ENV

      - name: Upload Installer to Firebase Storage (macOS)
        if: runner.os == 'macOS'
        run: |
          # Upload DMG files from packages/main/dist or dist folder. 
          # Note: Adjust source path if electron-builder output directory is different.
          DMG_FILE=$(find . -name "*.dmg" -type f | head -n 1)
          if [ -n "$DMG_FILE" ]; then
            firebase storage:upload "$DMG_FILE" founders/releases/indiiOS-Installer.dmg --project indiios-v-1-1 --non-interactive
          fi
        continue-on-error: true

      - name: Upload Installer to Firebase Storage (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Upload EXE files
          EXE_FILE=$(find . -name "*.exe" -type f | head -n 1)
          if [ -n "$EXE_FILE" ]; then
            firebase storage:upload "$EXE_FILE" founders/releases/indiiOS-Setup.exe --project indiios-v-1-1 --non-interactive
          fi
        continue-on-error: true

      - name: Cleanup credentials
        if: always()
        run: rm -f $HOME/gcloud-key.json
