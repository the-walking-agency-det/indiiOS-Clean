name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install system dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libgbm1 libasound2t64 libpangocairo-1.0-0 libxss1 libgtk-3-0 libsecret-1-dev
    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Lint
      run: npm run lint

    - name: Typecheck
      run: npm run typecheck

    - name: Build Electron App
      run: npm run electron:build

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libgbm1 libasound2t64 libpangocairo-1.0-0 libxss1 libgtk-3-0 libsecret-1-dev
    - name: Install dependencies
      run: npm ci --ignore-scripts

    # Item 376: Windows code signing — inject WINDOWS_CERTIFICATE secret for NSIS installer
    - name: Decode Windows certificate
      if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE != ''
      shell: pwsh
      env:
        WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      run: |
        $certBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
        [System.IO.File]::WriteAllBytes("win_cert.pfx", $certBytes)
        Import-PfxCertificate -FilePath win_cert.pfx -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)
        Remove-Item win_cert.pfx -Force

    - name: Build Electron App
      run: npm run electron:build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WIN_CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
        WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        CSC_IDENTITY_AUTO_DISCOVERY: true

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.os }}
        path: dist/
        retention-days: 5
