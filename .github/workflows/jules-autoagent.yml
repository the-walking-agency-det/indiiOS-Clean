name: Nightly Jules Agent Optimization
on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM daily
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Jules AutoAgent Harness
        uses: google-labs-code/jules-invoke@v1
        with:
          prompt: |
            Read optimization/autoagent/program.md and execute the optimization experiment loop.
            Focus on improving routing accuracy for the indii Conductor.
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: main
