name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" \u003e\u003e $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Audit dependencies for vulnerabilities (Item 252)
        run: pnpm audit --audit-level=high

      # Item 294: Deploy PR preview channel for QA sign-off
      - name: Deploy PR Preview Channel
        if: github.event_name == 'pull_request'
        run: |
          npx firebase-tools hosting:channel:deploy pr-${{ github.event.pull_request.number }} \
            --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --token "${{ secrets.FIREBASE_CI_TOKEN }}" \
            --expires 7d \
            --only app
        continue-on-error: true

      - name: Run linting checks
        run: pnpm run lint

      - name: TypeScript type check (Item 343)
        run: pnpm run typecheck

      - name: Run unit tests
        timeout-minutes: 30
        run: npm test -- --run --reporter=verbose --pool=forks --testTimeout=30000 --bail=3 --no-file-parallelism
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_VERTEX_PROJECT_ID: ${{ secrets.VITE_VERTEX_PROJECT_ID }}
          VITE_VERTEX_LOCATION: ${{ secrets.VITE_VERTEX_LOCATION }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_CHECK_DEBUG_TOKEN: ${{ secrets.VITE_FIREBASE_APP_CHECK_DEBUG_TOKEN }}

      - name: Run E2E tests (critical paths only — Item 345: only if unit tests passed)
        if: success()
        run: npm run test:e2e
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Build landing page
        run: |
          cd landing-page
          rm -rf dist .next
          pnpm install --no-frozen-lockfile --ignore-scripts
          NODE_ENV=production pnpm run build

      - name: Build studio app
        run: pnpm run build:studio
        env:
          NODE_ENV: production
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_VERTEX_PROJECT_ID: ${{ secrets.VITE_VERTEX_PROJECT_ID }}
          VITE_VERTEX_LOCATION: ${{ secrets.VITE_VERTEX_LOCATION }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_APP_CHECK_KEY: ${{ secrets.VITE_FIREBASE_APP_CHECK_KEY }}

      - name: Verify build outputs
        run: |
          echo "=== Landing Page Build ==="
          ls -la landing-page/dist/index.html
          echo ""
          echo "=== Studio Build ==="
          ls -la dist/index.html

      - name: Bundle size check
        run: |
          echo "=== Bundle Size Report ==="
          du -sh dist/
          echo ""
          echo "--- JS chunks ---"
          find dist/assets -name '*.js' -exec du -sh {} \; | sort -rh | head -20
          echo ""
          echo "--- CSS chunks ---"
          find dist/assets -name '*.css' -exec du -sh {} \; | sort -rh
          TOTAL_JS=$(find dist/assets -name '*.js' -exec cat {} \; | wc -c)
          TOTAL_CSS=$(find dist/assets -name '*.css' -exec cat {} \; | wc -c)
          echo ""
          echo "Total JS: $((TOTAL_JS / 1024))KB"
          echo "Total CSS: $((TOTAL_CSS / 1024))KB"
          # Fail if total JS exceeds 15MB (safety net)
          if [ "$TOTAL_JS" -gt 15728640 ]; then
            echo "::error::Total JS bundle exceeds 15MB threshold!"
            exit 1
          fi

      - name: Accessibility audit (axe-core)
        run: |
          npm install -g serve @axe-core/cli
          serve -s dist -l 5000 &
          sleep 3
          npx axe --exit http://localhost:5000
          kill %1 || true

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/gcloud-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json
          firebase projects:list --json

      - name: Deploy landing page to Firebase Hosting
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json
          echo "Deploying landing page to target: landing"
          firebase deploy --only hosting:landing --project indiios-v-1-1 --non-interactive --debug

      - name: Deploy studio app to Firebase Hosting
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json
          echo "Deploying studio app to target: app"
          firebase deploy --only hosting:app --project indiios-v-1-1 --non-interactive --debug

      - name: Lighthouse CI audit
        run: |
          npm install -g @lhci/cli
          lhci autorun --config='{"ci":{"collect":{"url":["https://app.indiios.com/"],"numberOfRuns":1},"assert":{"assertions":{"categories:performance":["warn",{"minScore":0.6}],"categories:accessibility":["warn",{"minScore":0.7}],"categories:best-practices":["warn",{"minScore":0.7}]}},"upload":{"target":"temporary-public-storage"}}}' || echo "::warning::Lighthouse audit completed with warnings - review scores above"

      - name: Cleanup credentials
        if: always()
        run: rm -f $HOME/gcloud-key.json
