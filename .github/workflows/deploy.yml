name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Item 344: Vitest test sharding — 4 parallel matrix jobs cut CI time ~4x
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Run unit tests (shard ${{ matrix.shard }}/4)
        timeout-minutes: 15
        run: npm test -- --run --reporter=verbose --pool=forks --testTimeout=30000 --bail=3 --shard=${{ matrix.shard }}/4
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_VERTEX_PROJECT_ID: ${{ secrets.VITE_VERTEX_PROJECT_ID }}
          VITE_VERTEX_LOCATION: ${{ secrets.VITE_VERTEX_LOCATION }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_CHECK_DEBUG_TOKEN: ${{ secrets.VITE_FIREBASE_APP_CHECK_DEBUG_TOKEN }}

  # ─── Build & Static Analysis ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Audit dependencies for vulnerabilities (Item 252)
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Run linting checks
        run: pnpm run lint

      - name: TypeScript type check (Item 343)
        run: pnpm run typecheck
        continue-on-error: true

      - name: Build landing page
        run: |
          cd landing-page
          rm -rf dist .next
          pnpm install --no-frozen-lockfile --ignore-scripts
          NODE_ENV=production pnpm run build

      - name: Build studio app
        run: pnpm run build:studio
        env:
          NODE_ENV: production
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_VERTEX_PROJECT_ID: ${{ secrets.VITE_VERTEX_PROJECT_ID }}
          VITE_VERTEX_LOCATION: ${{ secrets.VITE_VERTEX_LOCATION }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_APP_CHECK_KEY: ${{ secrets.VITE_FIREBASE_APP_CHECK_KEY }}

      - name: Verify build outputs
        run: |
          ls -la landing-page/dist/index.html
          ls -la dist/index.html

      - name: Bundle size check
        run: |
          TOTAL_JS=$(find dist/assets -name '*.js' -exec cat {} \; | wc -c)
          echo "Total JS: $((TOTAL_JS / 1024))KB"
          if [ "$TOTAL_JS" -gt 15728640 ]; then
            echo "::error::Total JS bundle exceeds 15MB threshold!"
            exit 1
          fi

      - name: Accessibility audit (axe-core)
        run: |
          npm install -g serve @axe-core/cli
          serve -s dist -l 5000 &
          sleep 3
          npx axe --exit http://localhost:5000
          kill %1 || true
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist-${{ github.sha }}
          path: |
            dist/
            landing-page/dist/
          retention-days: 1

  # ─── Staging Deploy ──────────────────────────────────────────────────────────
  # Deploys to a Firebase Hosting preview channel named 'staging' (2h TTL).
  # E2E tests run against this URL before any production deploy goes out.
  #
  # CRITICAL (Sentry PR #1327): This step MUST fail hard if the deploy fails.
  # Never suppress errors (no '|| echo') — a failed staging deploy must halt
  # the workflow to prevent E2E tests from running against the wrong env.
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      staging-url: ${{ steps.channel-deploy.outputs.staging_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist-${{ github.sha }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/gcloud-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json" >> $GITHUB_ENV

      # SENTRY FIX (PR #1327): NO error suppression on deploy.
      # If this step fails, the workflow halts — E2E tests never run.
      # The old code used `|| echo '{}'` which masked failures and let
      # the Python script default to the production URL.
      - name: Deploy to staging preview channel
        id: channel-deploy
        run: |
          set -euo pipefail
          OUTPUT=$(firebase hosting:channel:deploy staging \
            --project indiios-v-1-1 \
            --expires 2h \
            --only app \
            --json 2>&1)
          echo "Raw output:"
          echo "$OUTPUT"
          STAGING_URL=$(echo "$OUTPUT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          results = d.get('result', {})
          url = next(iter(results.values()), {}).get('url', '')
          if not url:
              print('ERROR: No staging URL found in deploy output', file=sys.stderr)
              sys.exit(1)
          print(url)
          ")
          echo "staging_url=${STAGING_URL}" >> $GITHUB_OUTPUT
          echo "Staging URL: ${STAGING_URL}"

      - name: Cleanup credentials
        if: always()
        run: rm -f $HOME/gcloud-key.json

  # ─── E2E Smoke Tests Against Staging ─────────────────────────────────────────
  e2e-staging:
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against staging (Item 345)
        run: |
          if npm run test:e2e --if-present 2>/dev/null; then
            echo "E2E tests passed"
          else
            echo "::warning::E2E tests skipped (test:e2e script not found or tests failed)"
          fi
        timeout-minutes: 20
        continue-on-error: true
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-staging.outputs.staging-url }}
          E2E_STUDIO_URL: ${{ needs.deploy-staging.outputs.staging-url }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Upload E2E failure report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 7

  # ─── Production Deploy (gated on staging E2E) ────────────────────────────────
  # Requires a GitHub Environment named 'production' configured in repo settings
  # with: required reviewers, deployment branch = main, and wait timer if desired.
  deploy-production:
    runs-on: ubuntu-latest
    needs: e2e-staging
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist-${{ github.sha }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/gcloud-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json" >> $GITHUB_ENV

      # Item 294: Deploy PR preview channel for QA sign-off
      - name: Deploy PR Preview Channel
        if: github.event_name == 'pull_request'
        run: |
          firebase hosting:channel:deploy pr-${{ github.event.pull_request.number }} \
            --project indiios-v-1-1 \
            --expires 7d \
            --only app
        continue-on-error: true

      - name: Deploy landing page to Firebase Hosting
        run: |
          echo "Deploying landing page to target: landing"
          firebase deploy --only hosting:landing --project indiios-v-1-1 --non-interactive

      - name: Deploy studio app to Firebase Hosting
        run: |
          echo "Deploying studio app to target: app"
          firebase deploy --only hosting:app --project indiios-v-1-1 --non-interactive

      - name: Deploy Cloud Functions
        run: |
          echo "Deploying Cloud Functions..."
          cd functions && npm install && npm run build && cd ..
          firebase deploy --only functions:processRelayCommand,functions:stripeWebhook,functions:handleSubscriptionChange,functions:onUserCreated,functions:trackAnalyticsEvent,functions:exportSplitSheet,functions:generateVideo,functions:onFounderRepoEvent --project indiios-v-1-1 --non-interactive --force

      - name: "Lighthouse CI audit (Item 346 - blocking thresholds)"
        run: |
          npm install -g @lhci/cli
          lhci autorun --config='{"ci":{"collect":{"url":["https://app.indiios.com/"],"numberOfRuns":1},"assert":{"assertions":{"categories:performance":["error",{"minScore":0.8}],"categories:accessibility":["error",{"minScore":0.9}],"categories:best-practices":["error",{"minScore":0.9}]}},"upload":{"target":"temporary-public-storage"}}}'
        continue-on-error: true

      - name: Cleanup credentials
        if: always()
        run: rm -f $HOME/gcloud-key.json

