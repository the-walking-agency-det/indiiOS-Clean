name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Sync agent guidelines
        run: npm run sync:agents

      - name: Lint
        run: npm run lint



      - name: Run unit tests
        timeout-minutes: 10
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm test -- --run --reporter=verbose --pool=forks --testTimeout=15000 --bail=3 --no-file-parallelism

      # E2E tests disabled — requires Vite dev server + Electron runtime which
      # hangs indefinitely on headless Ubuntu CI runners. Re-enable after setting
      # up proper Playwright CI config (browser install, webServer timeout, etc.)
      # - name: Run E2E tests (critical paths only)
      #   run: npm run test:e2e

      - name: Build landing page
        run: |
          cd landing-page
          rm -rf dist .next
          npm install --legacy-peer-deps --ignore-scripts
          NODE_ENV=production npm run build

      - name: Build studio app
        run: npm run build:studio
        env:
          NODE_ENV: production
          VITE_API_KEY: "${{ secrets.VITE_API_KEY }}"
          VITE_VERTEX_PROJECT_ID: "${{ secrets.VITE_VERTEX_PROJECT_ID }}"
          VITE_VERTEX_LOCATION: "${{ secrets.VITE_VERTEX_LOCATION }}"
          VITE_FIREBASE_API_KEY: "${{ secrets.VITE_FIREBASE_API_KEY }}"
          VITE_FIREBASE_PROJECT_ID: "${{ secrets.VITE_FIREBASE_PROJECT_ID }}"

      - name: Verify build outputs
        run: |
          echo "=== Landing Page Build ==="
          ls -la landing-page/dist/index.html
          echo ""
          echo "=== Studio Build ==="
          ls -la dist/index.html

      - name: Bundle size check
        run: |
          echo "=== Bundle Size Report ==="
          du -sh dist/
          echo ""
          echo "--- JS chunks ---"
          find dist/assets -name '*.js' -exec du -sh {} \; | sort -rh | head -20
          echo ""
          echo "--- CSS chunks ---"
          find dist/assets -name '*.css' -exec du -sh {} \; | sort -rh
          TOTAL_JS=$(find dist/assets -name '*.js' -exec cat {} \; | wc -c)
          TOTAL_CSS=$(find dist/assets -name '*.css' -exec cat {} \; | wc -c)
          echo ""
          echo "Total JS: $((TOTAL_JS / 1024))KB"
          echo "Total CSS: $((TOTAL_CSS / 1024))KB"
          # Fail if total JS exceeds 15MB (safety net)
          if [ "$TOTAL_JS" -gt 15728640 ]; then
            echo "::error::Total JS bundle exceeds 15MB threshold!"
            exit 1
          fi

      - name: Accessibility audit (axe-core)
        run: |
          npm install -g serve @axe-core/cli
          serve -s dist -l 5000 &
          sleep 3
          npx axe --exit http://localhost:5000 || echo "::warning::Accessibility issues found - review axe output above"
          kill %1 || true

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Firebase
        if: github.ref == 'refs/heads/main'
        env:
          FIREBASE_SERVICE_ACCOUNT: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > $HOME/gcloud-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json
          firebase projects:list --json

      - name: Deploy landing page to Firebase Hosting
        if: github.ref == 'refs/heads/main'
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json
          echo "Deploying landing page to target: landing"
          firebase deploy --only hosting:landing --project indiios-v-1-1 --non-interactive --debug

      - name: Deploy studio app to Firebase Hosting
        if: github.ref == 'refs/heads/main'
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json
          echo "Deploying studio app to target: app"
          firebase deploy --only hosting:app --project indiios-v-1-1 --non-interactive --debug

      - name: Lighthouse CI audit
        if: github.ref == 'refs/heads/main'
        run: |
          npm install -g @lhci/cli
          lhci autorun --config='{"ci":{"collect":{"url":["https://app.indiios.com/"],"numberOfRuns":1},"assert":{"assertions":{"categories:performance":["warn",{"minScore":0.6}],"categories:accessibility":["warn",{"minScore":0.7}],"categories:best-practices":["warn",{"minScore":0.7}]}},"upload":{"target":"temporary-public-storage"}}}' || echo "::warning::Lighthouse audit completed with warnings - review scores above"

      - name: Cleanup credentials
        if: always()
        run: rm -f $HOME/gcloud-key.json
