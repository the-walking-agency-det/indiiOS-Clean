name: Jules Asynchronous Global Scanner

on:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  jules_scheduled_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trigger Jules Global Scan
        env:
          JULES_API_TOKEN: ${{ secrets.JULES_API_TOKEN }}
        run: |
          PAYLOAD='{"analysis_scope": "full_ast", "cve_sync": true, "sandbox_vm_provision": true}'

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $JULES_API_TOKEN" \
            -d "$PAYLOAD" \
            "https://api.jules.devsecops/scan/global"

          echo "Scheduled global scan triggered."
