<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>indiiOS — Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f0f0f;
        color: #e5e7eb;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .container { max-width: 400px; }
      .icon { font-size: 3rem; margin-bottom: 1.5rem; }
      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; letter-spacing: -0.02em; }
      p { color: #6b7280; font-size: 0.875rem; line-height: 1.6; margin-bottom: 2rem; }
      button {
        background: #fff;
        color: #0f0f0f;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 0.75rem;
        font-size: 0.875rem;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      button:hover { background: #e5e7eb; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">🎵</div>
      <h1>You're Offline</h1>
      <p>indiiOS needs an internet connection to load. Check your connection and try again — your drafts and local projects are still available.</p>
      <button onclick="window.location.reload()">Try Again</button>
    </div>
  </body>
</html>
