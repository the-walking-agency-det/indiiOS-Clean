<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Mobile Viewport - Optimized for touch -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover, interactive-widget=resizes-content" />

    <!-- Theme Colors -->
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f0f0f" />

    <!-- Apple Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="indiiOS" />
    <!-- Item 396: iOS splash screen — prevents white flash on PWA launch -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#0f0f0f" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Mobile Browser UI -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Performance Hints - Google Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

    <!-- Item 363: Preconnect to Firebase for LCP improvement — reduces DNS + TLS handshake time -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin="anonymous" />
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin="anonymous" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />

    <title>indiiOS - AI Creative Studio</title>

    <!-- Critical Mobile Styles -->
    <style>
      /* Prevent white flash on load - set dark background immediately */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #0f0f0f;
        color: #ffffff;
      }

      /* Prevent pull-to-refresh on mobile */
      body {
        overscroll-behavior-y: contain;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
      }

      /* Prevent text selection on long press (for UI elements, not content) */
      * {
        -webkit-tap-highlight-color: transparent;
      }

      /* Optimize font rendering on mobile */
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* Safe area support */
      :root {
        --safe-area-inset-top: env(safe-area-inset-top);
        --safe-area-inset-right: env(safe-area-inset-right);
        --safe-area-inset-bottom: env(safe-area-inset-bottom);
        --safe-area-inset-left: env(safe-area-inset-left);
      }

      /* Initial loading state - prevents flash of unstyled content */
      #root:empty::before {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 48px;
        height: 48px;
        border: 3px solid rgba(99, 102, 241, 0.2);
        border-top-color: rgba(99, 102, 241, 0.8);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }
    </style>

    <script>
      // Startup watchdog: avoid infinite spinner when module boot fails before React mounts.
      (function () {
        const BOOT_TIMEOUT_MS = 12000;

        function showStartupFallback(reason) {
          const root = document.getElementById('root');
          if (!root || root.childElementCount > 0) return;

          const webglAvailable = (() => {
            try {
              const canvas = document.createElement('canvas');
              return !!(window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
            } catch {
              return false;
            }
          })();

          root.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0f;color:#e4e4e7;font-family:system-ui,sans-serif;padding:2rem;text-align:center">
              <div style="max-width:480px">
                <h1 style="font-size:1.5rem;margin-bottom:1rem;color:#a78bfa">indiiOS</h1>
                <p style="margin-bottom:1rem;opacity:0.85">The app took too long to start.</p>
                <p style="margin-bottom:1.5rem;opacity:0.65;font-size:0.9rem">${reason || 'Startup error detected.'} ${webglAvailable ? '' : 'WebGL appears unavailable in this browser/device.'}</p>
                <button onclick="location.reload()" style="background:#7c3aed;color:white;border:none;padding:0.75rem 2rem;border-radius:0.5rem;font-size:1rem;cursor:pointer">Reload App</button>
              </div>
            </div>`;
        }

        window.addEventListener('error', (event) => {
          showStartupFallback(event?.message || 'Script error');
        });

        window.addEventListener('unhandledrejection', (event) => {
          const reason = event?.reason instanceof Error ? event.reason.message : 'Unhandled startup promise rejection';
          showStartupFallback(reason);
        });

        setTimeout(() => {
          const root = document.getElementById('root');
          if (root && root.childElementCount === 0) {
            showStartupFallback('Startup timeout exceeded (12s).');
          }
        }, BOOT_TIMEOUT_MS);
      })();
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
