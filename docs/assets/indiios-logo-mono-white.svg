<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Monochrome white logo for dark backgrounds -->
  <!-- Outer rounded square -->
  <rect width="512" height="512" rx="128" fill="none" stroke="#FFFFFF" stroke-width="8"/>
  <!-- Inner inset panel -->
  <rect x="48" y="48" width="416" height="416" rx="96" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.3"/>
  <!-- Left "i" dot -->
  <circle cx="200" cy="155" r="28" fill="#FFFFFF"/>
  <!-- Right "i" dot -->
  <circle cx="312" cy="155" r="28" fill="#FFFFFF"/>
  <!-- Left "i" bar -->
  <rect x="174" y="210" width="52" height="160" rx="26" fill="#FFFFFF"/>
  <!-- Right "i" bar -->
  <rect x="286" y="210" width="52" height="160" rx="26" fill="#FFFFFF"/>
</svg>
